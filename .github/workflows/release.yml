name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2
        extensions: mbstring, xml, ctype, iconv, intl, dom

    # Pin to the 5.3 LTS line: on PHP 8.2 a plain install resolves the
    # end-of-life Contao 5.6 line, which has open advisories and would fail
    # the security check below.
    - name: Install dependencies
      run: composer update --prefer-dist --no-progress --with contao/core-bundle:"5.3.*"

    - name: Validate composer.json
      run: composer validate

    - name: Check PHP syntax
      run: |
        find src/ -name "*.php" -exec php -l {} \;

    - name: Check code style
      run: vendor/bin/ecs check

    - name: Run PHPStan analysis
      run: vendor/bin/phpstan analyse src/ --level=5

    - name: Run PHPUnit
      run: vendor/bin/phpunit

    # Fatal on security advisories — a release must never ship with a known
    # vulnerable dependency. Abandoned transitive packages are reported only.
    - name: Run security check
      run: composer audit --abandoned=report

    # The release body is the tag's section from CHANGELOG.md — fail the
    # release if the section is missing so a tag can never ship without notes.
    - name: Extract release notes from CHANGELOG.md
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        awk -v ver="$VERSION" '
          $0 ~ "^## \\[" ver "\\]" { found = 1; next }
          found && /^## \[/ { exit }
          found { print }
        ' CHANGELOG.md > release-notes.md

        if ! grep -q '[^[:space:]]' release-notes.md; then
          echo "::error::No section for version $VERSION found in CHANGELOG.md" >&2
          exit 1
        fi

        cat >> release-notes.md <<'EOF'

        ## 📦 Installation

        ```bash
        composer require juhe-it-solutions/contao-openai-assistant
        ```

        ## 🔗 Links

        - [Documentation](https://github.com/juhe-it-solutions/contao-openai-assistant/tree/main/docs)
        - [Full changelog](https://github.com/juhe-it-solutions/contao-openai-assistant/blob/main/CHANGELOG.md)
        EOF

    # Updates the existing release instead of failing when one was already
    # created manually for the tag (that broke the v2.0.2 release run).
    - name: Create or update GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "Version ${GITHUB_REF_NAME#v}" --notes-file release-notes.md
        else
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag \
            --title "Version ${GITHUB_REF_NAME#v}" --notes-file release-notes.md
        fi