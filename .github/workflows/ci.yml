name: CI

on:
  push:
    branches: [ main, develop, contao6 ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main, contao6 ]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.4
        extensions: mbstring, xml, ctype, iconv, intl, curl, json, dom, gd

    - name: Validate composer.json
      run: composer validate

    - name: Get composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-8.4-composer-

    # Pin static analysis to the supported Contao 6 line so PHPStan flags any
    # accidental use of APIs that do not exist in that core version.
    - name: Install dependencies
      run: composer update --prefer-dist --no-progress --with contao/core-bundle:"^6.0"

    - name: Check PHP syntax
      run: |
        find src/ -name "*.php" -exec php -l {} \;

    - name: Check code style
      run: vendor/bin/ecs check

    - name: Run PHPStan analysis
      run: vendor/bin/phpstan analyse src/ --level=5

  tests:
    name: PHPUnit (PHP ${{ matrix.php }}, Contao ${{ matrix.contao }})
    runs-on: ubuntu-latest

    # 3.0 is Contao-6-only. Gate on the minimum supported PHP (8.4). PHP 8.5 is
    # still pre-GA, so its leg is allowed to fail (experimental) until 8.5 ships.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.4'
            contao: '^6.0'
            experimental: false
          - php: '8.5'
            contao: '^6.0'
            experimental: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: mbstring, xml, ctype, iconv, intl, curl, json, dom, gd

    - name: Install dependencies
      run: composer update --prefer-dist --no-progress --with contao/core-bundle:"${{ matrix.contao }}"

    - name: Run PHPUnit
      run: vendor/bin/phpunit

  code-formatting:
    name: Code Formatting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.4
        extensions: mbstring, xml, ctype, iconv, intl, dom

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Format code
      run: vendor/bin/ecs check --fix

    - name: Check if formatting changed files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "Code formatting issues found. Please run 'vendor/bin/ecs check --fix' locally."
          git diff
          exit 1
        fi

  security:
    name: Security Check (PHP ${{ matrix.php }}, Contao ${{ matrix.contao }})
    runs-on: ubuntu-latest

    # PHP 8.5 is still pre-GA; keep its leg non-blocking (see the tests job).
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.4'
            contao: '^6.0'
            experimental: false
          - php: '8.5'
            contao: '^6.0'
            experimental: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}

    - name: Install dependencies
      run: composer update --prefer-dist --no-progress --with contao/core-bundle:"${{ matrix.contao }}"

    # Fatal on security advisories. Abandoned transitive packages are reported but do
    # not fail the build (they have no upstream fix we could apply here).
    - name: Run security check
      run: composer audit --abandoned=report
