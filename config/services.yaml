services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    JuheItSolutions\ContaoOpenaiAssistant\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Tests/'

    # AiChatController
    JuheItSolutions\ContaoOpenaiAssistant\Controller\AiChatController:
        arguments:
            $csrfTokenManager: '@contao.csrf.token_manager'
            $csrfTokenName: '%contao.csrf_token_name%'
        public: true

    # ApiValidationController
    JuheItSolutions\ContaoOpenaiAssistant\Controller\ApiValidationController:
        arguments:
            $httpClient: '@http_client'
            $logger: '@monolog.logger.contao'
            $csrfTokenManager: '@contao.csrf.token_manager'
            $csrfTokenName: '%contao.csrf_token_name%'
        public: true

    JuheItSolutions\ContaoOpenaiAssistant\Controller\LicenseValidationController:
        arguments:
            $csrfTokenManager: '@contao.csrf.token_manager'
            $csrfTokenName: '%contao.csrf_token_name%'
        public: true

    # BackendModule Controller
    JuheItSolutions\ContaoOpenaiAssistant\Controller\BackendModule\OpenAiDashboardController:
        public: true

    # FrontendModule Controller
    JuheItSolutions\ContaoOpenaiAssistant\Controller\FrontendModule\AiChatModuleController:
        public: true

    # OpenAI Responder Service (Responses API + Conversations API)
    JuheItSolutions\ContaoOpenaiAssistant\Service\OpenAiResponder:
        arguments:
            $http: '@http_client'
            $logger: '@monolog.logger.contao'
            $connection: '@doctrine.dbal.default_connection'
        public: true

    # Deprecated BC shim: keeps any 1.x customisations referring to OpenAiAssistant working until 2.1
    JuheItSolutions\ContaoOpenaiAssistant\Service\OpenAiAssistant:
        class: JuheItSolutions\ContaoOpenaiAssistant\Service\OpenAiAssistant
        public: true
        deprecated:
            package: juhe-it-solutions/contao-openai-assistant
            version: '2.0'
            message: 'The "%service_id%" service is deprecated, use OpenAiResponder instead.'

    # Encryption Service
    JuheItSolutions\ContaoOpenaiAssistant\Service\EncryptionService:
        arguments:
            $logger: '@monolog.logger.contao'
            $connection: '@doctrine.dbal.default_connection'
            $projectDir: '%kernel.project_dir%'
            $webDir: '%contao.web_dir%'
            $appSecret: '%kernel.secret%'
        public: true

    JuheItSolutions\ContaoOpenaiAssistant\Service\OpenAiModelCatalogService:
        arguments:
            $httpClient: '@http_client'
            $logger: '@monolog.logger.contao'

    # OpenAiConfigListener
    JuheItSolutions\ContaoOpenaiAssistant\EventListener\OpenAiConfigListener:
        arguments:
            $httpClient: '@http_client'
            $logger: '@monolog.logger.contao'
            $csrfTokenManager: '@contao.csrf.token_manager'
            $csrfTokenName: '%contao.csrf_token_name%'
            $requestStack: '@request_stack'
            $connection: '@doctrine.dbal.default_connection'
            $encryption: '@JuheItSolutions\ContaoOpenaiAssistant\Service\EncryptionService'
            $licenseValidation: '@JuheItSolutions\ContaoOpenaiAssistant\Service\LicenseValidationService'
            $autoUpdateService: '@JuheItSolutions\ContaoOpenaiAssistant\Service\VectorStoreAutoUpdateService'
            $fileSync: '@JuheItSolutions\ContaoOpenaiAssistant\Service\VectorStoreFileSync'
        public: true
        tags:
            - { name: contao.callback, table: tl_openai_config, target: config.onload, method: onLoadCallback }
            - { name: contao.callback, table: tl_openai_config, target: edit.buttons, method: removeSingleRecordCreateButtons }
            - { name: contao.callback, table: tl_openai_config, target: fields.api_key.load, method: processApiKeyForDisplay }
            - { name: contao.callback, table: tl_openai_config, target: list.label, method: addIcon }
            - { name: contao.callback, table: tl_openai_config, target: list.header, method: addHeader }
            - { name: contao.callback, table: tl_openai_config, target: fields.api_key.save, method: processApiKeyForStorage }
            - { name: contao.callback, table: tl_openai_config, target: config.ondelete, method: deleteVectorStore }
            # Premium license + auto-update (registered ONLY here — not in the DCA arrays — to run once via DI)
            - { name: contao.callback, table: tl_openai_config, target: config.onsubmit, method: validatePremiumLicenseOnSave }
            - { name: contao.callback, table: tl_openai_config, target: config.onsubmit, method: compileAutoUpdateSchedule }
            - { name: contao.callback, table: tl_openai_config, target: fields.premium_license_key.load, method: processLicenseKeyForDisplay }
            - { name: contao.callback, table: tl_openai_config, target: fields.premium_license_key.save, method: processLicenseKeyForStorage }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_enabled.load, method: loadAutoUpdateEnabled }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_enabled.save, method: saveAutoUpdateEnabled }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_trigger.save, method: guardAutoUpdateFieldWithoutLicense }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_schedule_hour.save, method: guardAutoUpdateFieldWithoutLicense }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_schedule_minute.save, method: guardAutoUpdateFieldWithoutLicense }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_schedule_weekday.save, method: guardAutoUpdateFieldWithoutLicense }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_schedule_day.save, method: guardAutoUpdateFieldWithoutLicense }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_mode.save, method: guardAutoUpdateFieldWithoutLicense }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_site_root.load, method: loadAutoUpdateSiteRoots }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_site_root.save, method: guardAutoUpdateFieldWithoutLicense }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_site_root.save, method: enforceCrawlPageLimit }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_model.options, method: getAutoUpdateModelOptions }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_model.save, method: validateAutoUpdateModel }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_prompt_template.load, method: loadAutoUpdatePromptTemplate }
            - { name: contao.callback, table: tl_openai_config, target: fields.auto_update_prompt_template.save, method: saveAutoUpdatePromptTemplate }

    # OpenAiFilesListener
    JuheItSolutions\ContaoOpenaiAssistant\EventListener\OpenAiFilesListener:
        arguments:
            $httpClient: '@http_client'
            $projectDir: '%kernel.project_dir%'
            $webDir: '%contao.web_dir%'
            $logger: '@monolog.logger.contao'
            $configListener: '@JuheItSolutions\ContaoOpenaiAssistant\EventListener\OpenAiConfigListener'
            $requestStack: '@request_stack'
            $connection: '@doctrine.dbal.default_connection'
            $csrfTokenManager: '@contao.csrf.token_manager'
            $csrfTokenName: '%contao.csrf_token_name%'
            $encryption: '@JuheItSolutions\ContaoOpenaiAssistant\Service\EncryptionService'
        public: true
        tags:
            - { name: contao.callback, table: tl_openai_files, target: fields.file_upload.save, method: uploadToOpenAI }
            - { name: contao.callback, table: tl_openai_files, target: list.child_record, method: listFiles }
            - { name: contao.callback, table: tl_openai_files, target: config.ondelete, method: deleteFromOpenAI }
            - { name: contao.callback, table: tl_openai_files, target: list.header, method: addHeader }

    # OpenAiPromptsListener
    JuheItSolutions\ContaoOpenaiAssistant\EventListener\OpenAiPromptsListener:
        arguments:
            $httpClient: '@http_client'
            $logger: '@monolog.logger.contao'
            $connection: '@doctrine.dbal.default_connection'
            $csrfTokenManager: '@contao.csrf.token_manager'
            $csrfTokenName: '%contao.csrf_token_name%'
            $requestStack: '@request_stack'
            $encryption: '@JuheItSolutions\ContaoOpenaiAssistant\Service\EncryptionService'
        public: true
        tags:
            - { name: contao.callback, table: tl_openai_prompts, target: config.onload, method: onLoadCallback }
            - { name: contao.callback, table: tl_openai_prompts, target: fields.model.options, method: getAvailableModels }
            - { name: contao.callback, table: tl_openai_prompts, target: fields.model.save, method: validateModel }
            - { name: contao.callback, table: tl_openai_prompts, target: fields.model_manual.save, method: validateManualModel }
            - { name: contao.callback, table: tl_openai_prompts, target: fields.system_instructions.save, method: normalizeSystemInstructions }
            - { name: contao.callback, table: tl_openai_prompts, target: fields.top_p.save, method: validateTopP }
            - { name: contao.callback, table: tl_openai_prompts, target: fields.temperature.save, method: validateTemperature }
            - { name: contao.callback, table: tl_openai_prompts, target: list.header, method: addHeader }
            - { name: contao.callback, table: tl_openai_prompts, target: list.label, method: listPrompts }
            - { name: contao.callback, table: tl_openai_prompts, target: list.child_record, method: listPrompts }

    # Security Voter
    JuheItSolutions\ContaoOpenaiAssistant\Security\Voter\AiChatVoter:
        tags:
            - { name: security.voter }

    # --- Automatic vector store updates ---

    # LicenseValidationService — $http needs explicit wiring; $encryption decrypts the
    # stored key before remote validation
    JuheItSolutions\ContaoOpenaiAssistant\Service\LicenseValidationService:
        arguments:
            $connection: '@doctrine.dbal.default_connection'
            $http: '@http_client'
            $encryption: '@JuheItSolutions\ContaoOpenaiAssistant\Service\EncryptionService'

    # CronHealthService — CLI cron heartbeat detection (auto-sync dashboard + config-form hint)
    JuheItSolutions\ContaoOpenaiAssistant\Service\CronHealthService:
        arguments:
            $connection: '@doctrine.dbal.default_connection'

    # VectorStoreFileSync — per-page upload/reconcile against the OpenAI vector store
    JuheItSolutions\ContaoOpenaiAssistant\Service\VectorStoreFileSync:
        arguments:
            $connection: '@doctrine.dbal.default_connection'
            $http: '@http_client'
            $logger: '@monolog.logger.contao'

    # VectorStoreAutoUpdateService — orchestration; ProcessUtil + EncryptionService +
    # LicenseValidationService + BoilerplateFilter + VectorStoreFileSync autowire by type
    JuheItSolutions\ContaoOpenaiAssistant\Service\VectorStoreAutoUpdateService:
        arguments:
            $connection: '@doctrine.dbal.default_connection'
            $http: '@http_client'
            $logger: '@monolog.logger.contao'

    # VectorStoreAutoUpdateCron — #[AsCronJob] handles registration; only $connection overridden
    JuheItSolutions\ContaoOpenaiAssistant\Cron\VectorStoreAutoUpdateCron:
        arguments:
            $connection: '@doctrine.dbal.default_connection'
            $logger: '@monolog.logger.contao'

    # VectorStoreAutoUpdateController — public for routing; $connection + CSRF wired explicitly
    JuheItSolutions\ContaoOpenaiAssistant\Controller\BackendModule\VectorStoreAutoUpdateController:
        arguments:
            $connection: '@doctrine.dbal.default_connection'
            $csrfTokenManager: '@contao.csrf.token_manager'
            $csrfTokenName: '%contao.csrf_token_name%'
        public: true

    # VectorStoreAutoUpdateCommand — autowired via #[AsCommand]; no explicit args needed.
    # BackendMenuListener — autoconfigured via #[AsEventListener]; Router + Security autowire.
